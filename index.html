/* ── VALIDACIÓN ────────────────────────────────────────────────── */
function validate(sec,d){
  const e={};
  if(sec===0){if(!d.consent1||!d.consent2||!d.consent3)e.consent='Debe aceptar los tres puntos.';
    ['h_nombre','h_cargo','h_institucion','h_ciudad','h_email','h_fecha'].forEach(k=>{if(!d[k])e[k]='Requerido.';});}
  if(sec===1){if(!d.a1)e.a1='Requerido.';if(!d.a2)e.a2='Requerido.';if(!d.a4)e.a4='Requerido.';}
  if(sec===2){if(!B_ITEMS.every(([c])=>d['b_'+c.toLowerCase()]))e.b='Complete todos los ítems B1–B5.';if(!d.b6)e.b6='Requerido.';}
  if(sec===3){if(!C_ITEMS.every(([k])=>d['c_imp_'+k]))e.c='Complete la Importancia de todos los componentes.';if(!d.c13)e.c13='Requerido.';}
  if(sec===5){if(!(d.e1||[]).length)e.e1='Marque al menos una opción.';if(!E2_STRATS.some(([k])=>d['e2_'+k]))e.e2='Valore al menos una estrategia.';if(!E3_FASES.every(([k])=>d['e3'+k]))e.e3='Valore las tres fases.';}
  if(sec===6){if(!d.f5)e.f5='Requerido.';}
  if(sec===7){if(!G_ITEMS.every(([k])=>d['g_'+k]))e.g14='Complete todos los criterios G1–G4.';if(!d.g5)e.g5='Requerido.';if(!d.g6)e.g6='Requerido.';}
  return e;
}
function secDone(i,d){
  const ok=[
    ()=>d.consent1&&d.consent2&&d.consent3&&d.h_nombre&&d.h_email,
    ()=>d.a1&&d.a2&&d.a4,
    ()=>B_ITEMS.every(([c])=>d['b_'+c.toLowerCase()])&&d.b6,
    ()=>C_ITEMS.every(([k])=>d['c_imp_'+k])&&d.c13,
    ()=>true,
    ()=>(d.e1||[]).length>0&&E2_STRATS.some(([k])=>d['e2_'+k])&&E3_FASES.every(([k])=>d['e3'+k]),
    ()=>!!d.f5,
    ()=>G_ITEMS.every(([k])=>d['g_'+k])&&d.g5&&d.g6,
  ];
  return ok[i]?.()||false;
}

/* ── CSV ───────────────────────────────────────────────────────── */
function buildCSVRows(d){
  const rows=[];const add=(k,v)=>rows.push([k,Array.isArray(v)?v.join('; '):(v??'')]);
  add('Timestamp',new Date().toISOString());
  ['h_nombre','h_cargo','h_institucion','h_ciudad','h_email','h_fecha'].forEach(k=>add(k,d[k]));
  add('A1',d.a1);add('A2',d.a2);add('A3',d.a3);add('A4',d.a4);add('A5',d.a5);
  B_ITEMS.forEach(([c])=>{const k=c.toLowerCase();add('B_'+c,d['b_'+k]);add('B_'+c+'_Com',d['b_com_'+k]);});
  add('B6',d.b6);add('B6_Just',d.b6_just);
  C_ITEMS.forEach(([k,code])=>{['imp','cla','via'].forEach(t=>add('C_'+code+'_'+t,d['c_'+t+'_'+k]));add('C_'+code+'_Sug',d['c_sug_'+k]);});
  add('C13',d.c13);add('C13_Det',d.c13_det);
  D_ETAPAS.forEach(([k])=>{['com','sen','tem','pro'].forEach(t=>add('D_'+k+'_'+t,d['d_'+t+'_'+k]));add('D_'+k+'_Obs',d['d_obs_'+k]);});
  E2_STRATS.forEach(([k])=>{add('E2_'+k,d['e2_'+k]);});
  E3_FASES.forEach(([k])=>{add('E3'+k,d['e3'+k]);});
  E4_CONTS.forEach(([k])=>{add('E4_'+k,d['e4_'+k]);});
  F_ANEXOS.forEach(([k,code])=>{['per','suf','usa'].forEach(t=>add('F_'+code+'_'+t,d['f_'+t+'_'+k]));});
  add('F5',d.f5);add('F5_Det',d.f5_det);
  G_ITEMS.forEach(([k,code])=>{add('G_'+code,d['g_'+k]);add('G_'+code+'_Com',d['g_com_'+k]);});
  add('G5',d.g5);add('G6',d.g6);add('G7',d.g7);
  return rows;
}
function downloadCSV(resps){
  const allFields=buildCSVRows(initForm()).map(r=>r[0]);
  const allCols=['N°','ID',...allFields];
  const rows=[allCols.map(c=>'"'+c+'"').join(',')];
  resps.forEach((r,i)=>{
    const frows=buildCSVRows(r.data);
    const fmap=Object.fromEntries(frows.map(([k,v])=>[k,v]));
    const row=[i+1,r.id];
    allFields.forEach(f=>row.push(fmap[f]??''));
    rows.push(row.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(','));
  });
  const blob=new Blob(['\uFEFF'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Delphi_R1.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ── AI ANALYSIS ───────────────────────────────────────────────── */
async function aiAnalysis(resps){
  const summary=resps.map((r,i)=>`Experto ${i+1}: ${r.data.h_nombre} (${r.data.h_cargo})\nG5: ${r.data.g5}\nG6: ${r.data.g6}\nG7: ${r.data.g7||'—'}`).join('\n---\n');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':CONFIG.API_KEY,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,
      messages:[{role:'user',content:`Analiza estos resultados Delphi sobre el Protocolo TEA-UNA/SELMA-B (${resps.length} respuestas):\n\n${summary}\n\nProvee análisis en español:\n## 1. Áreas de consenso\n## 2. Áreas de divergencia\n## 3. Prioridades de revisión\n## 4. Valoración global\n## 5. Recomendaciones para Ronda 2`}]}),
  });
  const data=await resp.json();
  return data.content?.[0]?.text||'Error al analizar.';
}

function AdminPanel({onLogout}){
  const [resps,setResps]=useState([]);

  const [analyzing,setAnalyzing]=useState(false);
  const [tab,setTab]=useState('responses');

  useEffect(()=>{
    const stored=LS.get(KS.responses)||[];
    setResps(stored.sort((a,b)=>a.ts-b.ts));
  },[]);

  async function doAnalysis(){
    if(!resps.length){alert('No hay respuestas importadas.');return;}
    setAnalyzing(true);

          <span style={{fontSize:12,color:'#aaa'}}>Las respuestas llegan a su correo — descargue el JSON y úselo en la pestaña "Importar JSON".</span>
        </div>}
        {resps.map((r,i)=>(
          <div key={r.id} style={{background:'#fff',border:`1px solid ${C.light}`,borderRadius:10,padding:18,marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div>
                <span style={{display:'inline-block',background:C.navy,color:C.gold2,fontSize:10,padding:'2px 8px',borderRadius:4,marginRight:8}}>#{i+1}</span>
                <strong style={{fontSize:14,color:C.navy}}>{r.data.h_nombre||'(sin nombre)'}</strong>
                <span style={{fontSize:12,color:C.slate,marginLeft:8}}>{r.data.h_cargo}{r.data.h_cargo&&r.data.h_institucion?' — ':''}{r.data.h_institucion}</span>
              </div>
            </div>
            <div style={{marginTop:10,display:'flex',gap:16,flexWrap:'wrap',fontSize:12,color:C.slate}}>
              <span>Ciudad: <strong>{r.data.h_ciudad||'—'}</strong></span>
              <span>Fecha: <strong>{r.data.h_fecha||'—'}</strong></span>
              <span>G5: <strong style={{color:C.navy}}>{r.data.g5?.slice(0,50)||'—'}</strong></span>
            </div>
          </div>
        ))}
      </div>}

      {tab==='import'&&<div>
        <div style={{background:'#fff',border:`1px solid ${C.light}`,borderRadius:10,padding:24}}>
          <h3 style={{color:C.navy,fontSize:15,fontWeight:600,fontFamily:'Georgia,serif',marginBottom:12}}>Importar respuestas (JSON)</h3>
          <IBox>
            En Formspree, descargue las respuestas como JSON. Pegue el contenido aquí para habilitarlas en este panel y en el análisis con IA.
          </IBox>
          <textarea rows={8} placeholder='[{"id":"...","data":{...}},...]'
            style={{width:'100%',padding:'10px 12px',border:`1.5px solid ${C.light}`,borderRadius:7,fontSize:12,fontFamily:'monospace',resize:'vertical',background:C.cream,marginBottom:12}}
            onChange={e=>{
              try{
                const arr=JSON.parse(e.target.value);
                if(Array.isArray(arr)){
                  LS.set(KS.responses,arr);
                  setResps(arr.sort((a,b)=>a.ts-b.ts));
                }
              }catch{}
            }}/>
          <p style={{fontSize:12,color:C.slate}}>Los datos se guardan localmente en este dispositivo.</p>
        </div>
      </div>}

      {tab==='analysis'&&<div>
        <div style={{background:'#fff',border:`1px solid ${C.light}`,borderRadius:10,padding:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
            <h3 style={{color:C.navy,fontSize:15,fontWeight:600,fontFamily:'Georgia,serif'}}>Análisis con IA — {CONFIG.RONDA}</h3>
            <button onClick={doAnalysis} disabled={analyzing||!resps.length} style={{padding:'9px 20px',border:`2px solid ${C.navy}`,borderRadius:7,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600,background:'#fff',color:C.navy,opacity:(analyzing||!resps.length)?0.6:1}}>
              {analyzing?'Analizando...':'Generar análisis'}
            </button>
          </div>
          {!analysis&&!analyzing&&<div style={{padding:30,textAlign:'center',color:C.slate,fontSize:13,fontStyle:'italic'}}>
            {resps.length===0?'Importe respuestas primero.':'Haga clic en "Generar análisis".'}
          </div>}
          {analyzing&&<div style={{padding:30,textAlign:'center',color:C.slate,fontSize:14}}>⏳ Procesando con IA...</div>}
          {analysis&&<div style={{fontSize:13.5,color:C.text,lineHeight:1.85,whiteSpace:'pre-wrap',fontFamily:'Georgia,serif'}}>{analysis}</div>}
        </div>
      </div>}
    </div>
  </div>;
}

/* ── APP ───────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState('loading');
  const [session,setSession]=useState(null);
  const [sec,setSec]=useState(0);
  const [errors,setErrors]=useState({});
  const [saveStatus,setSaveStatus]=useState('');
  const [adminPass,setAdminPass]=useState('');
  const [authErr,setAuthErr]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [submitErr,setSubmitErr]=useState('');
  const saveTimer=useRef(null);

  useEffect(()=>{
    const me=LS.get(KS.me);
    const isOpen=LS.get(KS.open)!==false;
    if(me){
      setSession(me);setSec(me.section||0);
      if(me.submitted){setView('already');return;}
      if(!isOpen){setView('closed');return;}
      setView('form');
    } else {
      if(!isOpen){setView('closed');return;}
      setView('welcome');
    }
  },[]);

  function start(){
    const sess={id:uid(),section:0,data:initForm(),submitted:false,ts:Date.now()};
    LS.set(KS.me,sess);setSession(sess);setSec(0);setView('form');
  }

  const persist=useCallback((sess,s)=>{
    setSaveStatus('saving');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      LS.set(KS.me,{...sess,section:s});
      setSaveStatus('saved');setTimeout(()=>setSaveStatus(''),2000);
    },400);
  },[]);

  function upd(key,val){
    if(!session)return;
    const next={...session,data:{...session.data,[key]:val}};
    setSession(next);persist(next,sec);
    setErrors(p=>{const e={...p};delete e[key];return e;});
  }

  function goTo(s){setSec(s);persist(session,s);window.scrollTo({top:0});}
  function next(){const errs=validate(sec,session.data);if(Object.keys(errs).length){setErrors(errs);return;}setErrors({});goTo(sec+1);}

  async function submit(){
    const errs=validate(7,session.data);
    if(Object.keys(errs).length){setErrors(errs);return;}
    setSubmitting(true);setSubmitErr('');
    const record={...session,submitted:true,ts:Date.now()};
    const ok=await submitToFormspree(record.data);
    if(!ok&&CONFIG.FORMSPREE_URL.includes('REEMPLAZAR')){
      // Dev mode: just save locally
      LS.set(KS.me,record);setSession(record);setSubmitting(false);setView('done');return;
    }
    if(!ok){setSubmitErr('Error al enviar. Verifique su conexión e intente nuevamente.');setSubmitting(false);return;}
    LS.set(KS.me,record);setSession(record);setSubmitting(false);setView('done');
  }

  function adminLogin(){
    if(adminPass===CONFIG.ADMIN_PASS){setView('admin');setAuthErr('');}
    else setAuthErr('Contraseña incorrecta.');
  }

  const compSecs=SECS.map((_,i)=>session?secDone(i,session.data):false);
  const progress=Math.round((sec/SECS.length)*100);

  if(view==='loading')return<div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{color:C.navy,fontSize:16}}>Cargando...</div></div>;
  if(view==='admin')return<AdminPanel onLogout={()=>{setAdminPass('');setView('welcome');}}/>;

  if(view==='admin-login')return(
    <div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{background:'#fff',border:`1px solid ${C.light}`,borderRadius:12,overflow:'hidden',width:'100%',maxWidth:400}}>
        <div style={{background:C.navy,padding:'24px 28px',borderBottom:`3px solid ${C.gold}`,textAlign:'center'}}>
          <div style={{color:C.gold2,fontSize:10,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:4}}>Panel de Administración</div>
          <h2 style={{color:'#fff',fontFamily:'Georgia,serif',fontSize:18,fontWeight:600}}>{CONFIG.TITULO}</h2>
        </div>
        <div style={{padding:28}}>
          <div style={{fontSize:13,color:C.slate,marginBottom:18}}>Ingrese la contraseña de investigadora para acceder.</div>
          <TIn value={adminPass} onChange={setAdminPass} placeholder="Contraseña" type="password" style={{marginBottom:10}}/>
          {authErr&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{authErr}</div>}
          <button onClick={adminLogin} style={{width:'100%',padding:'11px',border:'none',borderRadius:8,background:C.navy,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'Georgia,serif'}}>Acceder</button>
          <button onClick={()=>setView('welcome')} style={{width:'100%',marginTop:10,padding:'8px',border:'none',background:'transparent',color:C.slate,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>← Volver</button>
        </div>
      </div>
    </div>
  );

  if(view==='closed')return(
    <div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:500}}>
        <div style={{fontSize:48,marginBottom:16}}>🔒</div>
        <h2 style={{color:C.navy,fontFamily:'Georgia,serif',fontSize:22,marginBottom:10}}>Instrumento cerrado</h2>
        <p style={{color:C.slate,fontSize:14,lineHeight:1.7,marginBottom:24}}>El período de respuesta ha finalizado. Gracias por su interés.</p>
        <button onClick={()=>setView('admin-login')} style={{background:'transparent',border:`1px solid ${C.light}`,color:C.slate,padding:'8px 18px',borderRadius:7,cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>Acceso investigadora</button>
      </div>
    </div>
  );

  if(view==='already')return(
    <div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:500}}>
        <div style={{fontSize:52,marginBottom:16}}>✅</div>
        <h2 style={{color:C.navy,fontFamily:'Georgia,serif',fontSize:22,marginBottom:10}}>Ya registró su respuesta</h2>
        <p style={{color:C.slate,fontSize:14,lineHeight:1.7}}>Su participación en la {CONFIG.RONDA} fue registrada exitosamente. Gracias por su contribución.</p>
      </div>
    </div>
  );

  if(view==='done')return(
    <div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:520,width:'100%',background:'#fff',border:`1px solid ${C.light}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{background:C.navy,padding:'32px 28px',textAlign:'center',borderBottom:`3px solid ${C.gold}`}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <h2 style={{color:'#fff',fontFamily:'Georgia,serif',fontSize:24,fontWeight:700,marginBottom:6}}>¡Instrumento enviado!</h2>
          <p style={{color:'#a8b8d8',fontSize:13,fontStyle:'italic'}}>{CONFIG.RONDA} — {CONFIG.TITULO}</p>
        </div>
        <div style={{padding:'28px 32px',textAlign:'center'}}>
          <p style={{color:C.slate,fontSize:14,lineHeight:1.75}}>
            Gracias por su participación en la validación del Protocolo TEA-UNA/SELMA-B. Su expertise contribuye directamente a garantizar el acceso a la justicia para personas con TEA en Paraguay.
          </p>
          <div style={{marginTop:20,padding:'12px 16px',background:C.cream,borderRadius:8,fontSize:12.5,color:C.slate,border:`1px solid ${C.light}`}}>
            <strong style={{color:C.navy}}>{CONFIG.INVESTIGADORA}</strong> · {CONFIG.PROGRAMA}<br/>{CONFIG.INSTITUCION}
          </div>
        </div>
      </div>
    </div>
  );

  if(view==='welcome')return(
    <div style={{minHeight:'100vh',background:C.cream,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{maxWidth:560,width:'100%'}}>
        <div style={{background:C.navy,padding:'32px 28px',borderRadius:'12px 12px 0 0',borderBottom:`3px solid ${C.gold}`,textAlign:'center'}}>
          <div style={{display:'inline-block',border:`1px solid ${C.gold}`,color:C.gold2,fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',padding:'4px 14px',borderRadius:20,marginBottom:14}}>{CONFIG.RONDA} · Instrumento Delphi</div>
          <h1 style={{color:'#fff',fontFamily:'Georgia,serif',fontSize:'clamp(16px,3vw,21px)',fontWeight:700,lineHeight:1.3,marginBottom:6}}>{CONFIG.TITULO}</h1>
          <p style={{color:'#a8b8d8',fontSize:13,fontStyle:'italic'}}>{CONFIG.SUBTITULO}</p>
        </div>
        <div style={{background:'#fff',border:`1px solid ${C.light}`,borderRadius:'0 0 12px 12px',padding:28}}>
          <p style={{fontSize:13.5,color:C.text,lineHeight:1.75,marginBottom:20}}>
            Este instrumento está dirigido a expertos/as seleccionados/as para participar en la validación del Protocolo de Acceso a la Justicia para Personas con TEA. El proceso toma aproximadamente <strong>15–20 minutos</strong>. Sus respuestas se guardan automáticamente.
          </p>
          <div style={{background:'#eef2fc',borderLeft:`3px solid ${C.navy}`,padding:'11px 14px',borderRadius:'0 7px 7px 0',marginBottom:22,fontSize:12.5,color:C.navy2,lineHeight:1.6}}>
            <strong>El formulario consta de 8 secciones.</strong> Puede pausar y retomar desde donde quedó en cualquier momento desde este mismo dispositivo.
          </div>
          <button onClick={start} style={{width:'100%',padding:'13px',border:'none',borderRadius:8,background:C.navy,color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'Georgia,serif'}}>
            Iniciar instrumento →
          </button>
          <button onClick={()=>setView('admin-login')} style={{width:'100%',marginTop:10,padding:'8px',border:'none',background:'transparent',color:C.slate,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
            Acceso investigadora
          </button>
        </div>
        <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'#aaa',fontFamily:'sans-serif'}}>
          {CONFIG.PROGRAMA} · {CONFIG.INSTITUCION} · {CONFIG.INVESTIGADORA}
        </div>
      </div>
    </div>
  );

  return(
    <div style={{fontFamily:'Georgia,serif',color:C.text,fontSize:15,lineHeight:1.7,background:C.cream,minHeight:'100vh'}}>
      <div style={{position:'sticky',top:0,zIndex:100,background:'rgba(247,244,239,0.97)',borderBottom:`1px solid ${C.light}`,padding:'7px 16px',backdropFilter:'blur(4px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,maxWidth:860,margin:'0 auto'}}>
          <div style={{flex:1,height:5,background:C.light,borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',background:C.gold,width:progress+'%',transition:'width .5s'}}/>
          </div>
          <span style={{fontSize:11,color:C.navy,whiteSpace:'nowrap',fontFamily:'sans-serif'}}>{progress}%</span>
          {saveStatus==='saving'&&<span style={{fontSize:11,color:C.slate,fontFamily:'sans-serif'}}>Guardando...</span>}
          {saveStatus==='saved'&&<span style={{fontSize:11,color:C.green,fontFamily:'sans-serif'}}>✓ Guardado</span>}
        </div>
      </div>
      <div style={{background:C.navy,padding:'24px 24px 20px',textAlign:'center',borderBottom:`3px solid ${C.gold}`}}>
        <h1 style={{color:'#fff',fontFamily:'Georgia,serif',fontSize:'clamp(15px,2.5vw,20px)',fontWeight:700,marginBottom:3}}>{CONFIG.TITULO}</h1>
        <p style={{color:'#a8b8d8',fontSize:12,fontStyle:'italic'}}>{CONFIG.RONDA} — {CONFIG.SUBTITULO}</p>
      </div>
      <div style={{maxWidth:860,margin:'0 auto',padding:'0 16px 80px'}}>
        <div style={{display:'flex',gap:5,padding:'18px 0 6px',overflowX:'auto'}}>
          {SECS.map(([num,name],i)=>(
            <button key={i} onClick={()=>i<=sec&&goTo(i)} title={`Sección ${num}: ${name}`}
              style={{flexShrink:0,width:30,height:30,borderRadius:'50%',border:'none',
                cursor:i<=sec?'pointer':'default',
                background:compSecs[i]?C.green:(i===sec?C.navy:(i<sec?C.navy2:C.light)),
                color:i<=sec?'#fff':C.slate,fontSize:11,fontWeight:600,transition:'all .2s',fontFamily:'sans-serif'}}>
              {compSecs[i]?'✓':num}
            </button>
          ))}
        </div>
        <div style={{background:C.navy,color:'#fff',padding:'20px 26px',marginTop:16,borderRadius:'8px 8px 0 0',borderLeft:`4px solid ${C.gold}`}}>
          <div style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:C.gold2,marginBottom:4,fontFamily:'sans-serif'}}>Sección {SECS[sec][0]} de {SECS.length}</div>
          <h2 style={{fontFamily:'Georgia,serif',fontSize:'clamp(14px,2.5vw,19px)',fontWeight:600}}>{SECS[sec][1]}</h2>
        </div>
        <div style={{background:'#fff',borderRadius:'0 0 8px 8px',padding:26,border:`1px solid ${C.light}`,borderTop:'none'}}>
          {sec===0&&session&&<Sec1 d={session.data} u={upd} errors={errors}/>}
          {sec===1&&session&&<Sec2 d={session.data} u={upd} errors={errors}/>}
          {sec===2&&session&&<Sec3 d={session.data} u={upd} errors={errors}/>}
          {sec===3&&session&&<Sec4 d={session.data} u={upd} errors={errors}/>}
          {sec===4&&session&&<Sec5 d={session.data} u={upd}/>}
          {sec===5&&session&&<Sec6 d={session.data} u={upd} errors={errors}/>}
          {sec===6&&session&&<Sec7 d={session.data} u={upd} errors={errors}/>}
          {sec===7&&session&&<Sec8 d={session.data} u={upd} errors={errors}/>}
          {submitErr&&<div style={{color:C.red,fontSize:13,marginTop:12,padding:'10px 14px',background:'#fdf0f0',borderRadius:7,border:'1px solid #f0c0c0'}}>{submitErr}</div>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:26,gap:12}}>
            {sec>0?<button onClick={()=>goTo(sec-1)} style={{padding:'10px 22px',border:`2px solid ${C.navy}`,borderRadius:7,fontFamily:'inherit',fontSize:13.5,fontWeight:600,cursor:'pointer',background:'#fff',color:C.navy}}>← Anterior</button>:<div/>}
            {sec<7?<button onClick={next} style={{padding:'10px 22px',border:'none',borderRadius:7,fontFamily:'inherit',fontSize:13.5,fontWeight:600,cursor:'pointer',background:C.navy,color:'#fff'}}>Continuar →</button>
              :<button onClick={submit} disabled={submitting} style={{padding:'12px 32px',border:'none',borderRadius:7,fontFamily:'Georgia,serif',fontSize:15,fontWeight:600,cursor:'pointer',background:C.green,color:'#fff',opacity:submitting?0.7:1}}>
                {submitting?'Enviando...':'Enviar instrumento'}
              </button>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
